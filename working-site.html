<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Gaffer's Hub | Premier League Stats & Weather</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            colors: {
              primary: '#1a237e',
              secondary: '#ffffff',
              accent: '#ff4081',
              highlight: '#d50000',
              dark: '#0f172a',
              light: '#f8fafc',
              success: '#22c55e',
              warning: '#f59e0b',
              paper: '#fdfbf7',
            },
            fontFamily: {
              sans: ['Roboto', 'sans-serif'],
              heading: ['Montserrat', 'sans-serif'],
            },
          }
        }
      }
    </script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
  </head>
  <body class="bg-slate-50 dark:bg-dark text-dark dark:text-light transition-colors duration-300">
    <div id="root"></div>

    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel">
      const { useState, useEffect, useRef } = React;

      // STADIUM COORDINATES
      const STADIUMS = {
        "Arsenal": { lat: 51.5549, lng: -0.1084 },
        "Aston Villa": { lat: 52.5091, lng: -1.8848 },
        "Bournemouth": { lat: 50.7352, lng: -1.8385 },
        "Brentford": { lat: 51.4907, lng: -0.2891 },
        "Brighton": { lat: 50.8616, lng: -0.0837 },
        "Chelsea": { lat: 51.4816, lng: -0.1909 },
        "Crystal Palace": { lat: 51.3982, lng: -0.0855 },
        "Everton": { lat: 53.4388, lng: -2.9663 },
        "Fulham": { lat: 51.4749, lng: -0.2216 },
        "Liverpool": { lat: 53.4308, lng: -2.9608 },
        "Man City": { lat: 53.4831, lng: -2.2004 },
        "Man Utd": { lat: 53.4631, lng: -2.2913 },
        "Newcastle": { lat: 54.9756, lng: -1.6218 },
        "Nott'm Forest": { lat: 52.9400, lng: -1.1329 },
        "Sheffield Utd": { lat: 53.3704, lng: -1.4709 },
        "Spurs": { lat: 51.6042, lng: -0.0662 },
        "West Ham": { lat: 51.5387, lng: -0.0166 },
        "Wolves": { lat: 52.5902, lng: -2.1304 },
      };

      // Mock fixtures data
      const MOCK_FIXTURES = [
        { 
          homeTeam: "Man City", 
          awayTeam: "Liverpool", 
          date: "Today", 
          time: "20:00", 
          status: "upcoming", 
          score: "0 - 0",
          difficulty: { att: 2, def: 3 }
        },
        { 
          homeTeam: "Arsenal", 
          awayTeam: "Chelsea", 
          date: "Tomorrow", 
          time: "15:00", 
          status: "upcoming", 
          score: "0 - 0",
          difficulty: { att: 1, def: 2 }
        },
        { 
          homeTeam: "Man Utd", 
          awayTeam: "Newcastle", 
          date: "Sunday", 
          time: "16:30", 
          status: "upcoming", 
          score: "0 - 0",
          difficulty: { att: 3, def: 4 }
        },
        { 
          homeTeam: "Tottenham", 
          awayTeam: "Brighton", 
          date: "Monday", 
          time: "20:00", 
          status: "upcoming", 
          score: "0 - 0",
          difficulty: { att: 2, def: 2 }
        }
      ];

      // Weather functions
      const getWeatherIcon = (weather) => {
        if (weather.precipitation > 0.5) return 'fa-cloud-rain';
        if (weather.cloud_cover > 70) return 'fa-cloud';
        if (weather.cloud_cover > 30) return 'fa-cloud-sun';
        return 'fa-sun';
      };

      const getWeatherVerdict = (weather) => {
        if (weather.precipitation > 0.5) return { text: 'Slick', color: 'text-blue-500' };
        if (weather.wind_speed_10m > 15) return { text: 'Windy', color: 'text-gray-500' };
        if (weather.temperature_2m > 20) return { text: 'Hot', color: 'text-orange-500' };
        if (weather.temperature_2m < 5) return { text: 'Cold', color: 'text-cyan-500' };
        return { text: 'Perfect', color: 'text-green-500' };
      };

      // Navbar Component
      const Navbar = ({ darkMode, toggleTheme }) => {
        return (
          <nav className="bg-primary text-white shadow-lg sticky top-0 z-50">
            <div className="container mx-auto px-4">
              <div className="flex justify-between items-center h-16">
                <div className="flex items-center space-x-3">
                  <i className="fas fa-futbol text-2xl text-accent"></i>
                  <h1 className="text-xl font-bold heading">The Gaffer's Hub</h1>
                </div>
                <div className="flex items-center space-x-4">
                  <button
                    onClick={toggleTheme}
                    className="p-2 rounded-lg bg-accent hover:bg-[#f50057] transition-colors"
                    aria-label="Toggle theme"
                  >
                    <i className={`fas ${darkMode ? 'fa-sun' : 'fa-moon'}`}></i>
                  </button>
                </div>
              </div>
            </div>
          </nav>
        );
      };

      // Hero Component
      const Hero = ({ currentGameweek }) => {
        return (
          <div className="bg-gradient-to-r from-primary to-purple-700 text-white py-16">
            <div className="container mx-auto px-4 text-center">
              <h1 className="text-4xl md:text-5xl font-bold mb-4 heading">
                Premier League Hub
              </h1>
              <p className="text-xl mb-8">
                Proper Football Stats with Weather Intelligence
              </p>
              <div className="flex justify-center space-x-4">
                <div className="bg-accent px-6 py-3 rounded-full font-bold">
                  Gameweek {currentGameweek || 1}
                </div>
                <div className="bg-success px-6 py-3 rounded-full font-bold">
                  🌤️ Weather Enhanced
                </div>
              </div>
            </div>
          </div>
        );
      };

      // SmartFixtures Component with Weather
      const SmartFixtures = ({ data }) => {
        const [weatherData, setWeatherData] = useState({});
        const [weatherLoading, setWeatherLoading] = useState({});

        const fetchWeatherForStadium = async (homeTeam) => {
          if (weatherData[homeTeam] || weatherLoading[homeTeam]) return;
          
          setWeatherLoading(prev => ({ ...prev, [homeTeam]: true }));
          
          const stadiumKey = Object.keys(STADIUMS).find(k => homeTeam.includes(k) || k.includes(homeTeam));
          
          if (stadiumKey) {
            const { lat, lng } = STADIUMS[stadiumKey];
            try {
              const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lng}&current=temperature_2m,precipitation,wind_speed_10m,cloud_cover&wind_speed_unit=mph`);
              const data = await res.json();
              if (data.current) {
                setWeatherData(prev => ({ ...prev, [homeTeam]: data.current }));
              }
            } catch (e) {
              console.error(`Weather error for ${homeTeam}`, e);
              setWeatherData(prev => ({ ...prev, [homeTeam]: { temperature_2m: 12, wind_speed_10m: 10, precipitation: 0, cloud_cover: 50 } }));
            }
          }
          
          setWeatherLoading(prev => ({ ...prev, [homeTeam]: false }));
        };

        useEffect(() => {
          const upcomingMatches = data?.filter(f => f.status !== 'finished') || [];
          upcomingMatches.slice(0, 5).forEach(match => {
            fetchWeatherForStadium(match.homeTeam);
          });
        }, [data]);

        const getFDRColor = (rating) => {
          switch(rating) {
            case 1: return 'bg-emerald-500 text-white';
            case 2: return 'bg-emerald-300 text-emerald-900';
            case 3: return 'bg-slate-300 text-slate-800';
            case 4: return 'bg-orange-400 text-white';
            case 5: return 'bg-red-600 text-white';
            default: return 'bg-slate-200 text-slate-500';
          }
        };

        return (
          <div className="bg-white dark:bg-slate-800 rounded-xl shadow-xl overflow-hidden border border-slate-200 dark:border-slate-700">
            <div className="p-4 bg-slate-50 dark:bg-slate-900 border-b border-slate-200 dark:border-slate-700">
              <h2 className="text-xl font-bold text-primary dark:text-white mb-3">
                Upcoming Fixtures with Weather 🌤️
              </h2>
              <p className="text-xs text-slate-700 dark:text-slate-300">
                <strong className="text-primary dark:text-white mr-1">🌤️ Pitch Conditions:</strong> 
                Click weather icons for detailed conditions. <span className="font-bold text-green-500">Perfect</span> = Ideal, <span className="font-bold text-blue-500">Slick</span> = Rainy, <span className="font-bold text-gray-500">Windy</span> = Strong winds.
              </p>
            </div>
            
            <div className="divide-y divide-slate-200 dark:divide-slate-700">
              {data.map((match, index) => (
                <div key={index} className="p-4 hover:bg-slate-50 dark:hover:bg-slate-900 transition-colors">
                  <div className="flex items-center justify-between">
                    <div className="flex items-center space-x-4">
                      <div className="text-center">
                        <div className="w-12 h-12 bg-slate-200 dark:bg-slate-700 rounded-full flex items-center justify-center mb-1">
                          <i className="fas fa-shield-alt text-slate-600 dark:text-slate-300"></i>
                        </div>
                        <p className="text-xs font-medium text-slate-600 dark:text-slate-300">{match.homeTeam}</p>
                      </div>
                      
                      <div className="text-center">
                        <div className="text-lg font-bold text-slate-800 dark:text-white">{match.score}</div>
                        <div className="text-xs text-slate-500">{match.time}</div>
                        <div className="text-xs text-slate-500">{match.date}</div>
                      </div>
                      
                      <div className="text-center">
                        <div className="w-12 h-12 bg-slate-200 dark:bg-slate-700 rounded-full flex items-center justify-center mb-1">
                          <i className="fas fa-shield-alt text-slate-600 dark:text-slate-300"></i>
                        </div>
                        <p className="text-xs font-medium text-slate-600 dark:text-slate-300">{match.awayTeam}</p>
                      </div>
                    </div>

                    <div className="flex items-center space-x-3">
                      <div className="text-center">
                        <div className="text-xs text-slate-500 mb-1">ATT</div>
                        <div className={`px-2 py-1 rounded text-xs font-bold ${getFDRColor(match.difficulty?.att)}`}>
                          {match.difficulty?.att || '-'}
                        </div>
                      </div>
                      <div className="text-center">
                        <div className="text-xs text-slate-500 mb-1">DEF</div>
                        <div className={`px-2 py-1 rounded text-xs font-bold ${getFDRColor(match.difficulty?.def)}`}>
                          {match.difficulty?.def || '-'}
                        </div>
                      </div>
                    </div>

                    {/* Weather Widget */}
                    {match.status !== 'finished' && (
                      <div className="w-20 text-center">
                        {weatherLoading[match.homeTeam] ? (
                          <div className="flex flex-col items-center gap-1">
                            <div className="w-6 h-6 border-2 border-slate-300 border-t-transparent rounded-full animate-spin"></div>
                            <span className="text-xs text-slate-400">Loading</span>
                          </div>
                        ) : weatherData[match.homeTeam] ? (
                          <div className="flex flex-col items-center gap-1 group cursor-pointer" onClick={() => fetchWeatherForStadium(match.homeTeam)}>
                            <div className="relative">
                              <i className={`fas ${getWeatherIcon(weatherData[match.homeTeam])} text-lg ${getWeatherVerdict(weatherData[match.homeTeam]).color}`}></i>
                              <span className="absolute -top-1 -right-1 text-xs font-bold text-slate-600 dark:text-slate-300">
                                {Math.round(weatherData[match.homeTeam].temperature_2m)}°
                              </span>
                            </div>
                            <div className="text-xs">
                              <span className={`font-bold ${getWeatherVerdict(weatherData[match.homeTeam]).color}`}>
                                {getWeatherVerdict(weatherData[match.homeTeam]).text}
                              </span>
                            </div>
                            <div className="hidden group-hover:flex flex-col gap-1 absolute z-20 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg p-2 shadow-lg mt-8 min-w-[100px]">
                              <div className="text-xs font-bold text-slate-600 dark:text-slate-300">
                                <div className="flex justify-between gap-2">
                                  <span>Wind:</span>
                                  <span>{weatherData[match.homeTeam].wind_speed_10m} mph</span>
                                </div>
                                <div className="flex justify-between gap-2">
                                  <span>Rain:</span>
                                  <span>{weatherData[match.homeTeam].precipitation} mm</span>
                                </div>
                              </div>
                            </div>
                          </div>
                        ) : (
                          <div className="flex flex-col items-center gap-1">
                            <button 
                              onClick={() => fetchWeatherForStadium(match.homeTeam)}
                              className="w-6 h-6 bg-slate-100 dark:bg-slate-700 rounded-full flex items-center justify-center hover:bg-slate-200 dark:hover:bg-slate-600 transition-colors"
                              title="Get weather"
                            >
                              <i className="fas fa-cloud text-xs text-slate-400"></i>
                            </button>
                            <span className="text-xs text-slate-400">Weather</span>
                          </div>
                        )}
                      </div>
                    )}
                  </div>
                </div>
              ))}
            </div>
          </div>
        );
      };

      // Main App Component
      const App = () => {
        const [darkMode, setDarkMode] = useState(false);

        useEffect(() => {
          if (localStorage.getItem('color-theme') === 'dark' || (!('color-theme' in localStorage) && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            setDarkMode(true);
            document.documentElement.classList.add('dark');
          } else {
            setDarkMode(false);
            document.documentElement.classList.remove('dark');
          }
        }, []);

        const toggleTheme = () => {
          if (darkMode) {
            document.documentElement.classList.remove('dark');
            localStorage.setItem('color-theme', 'light');
            setDarkMode(false);
          } else {
            document.documentElement.classList.add('dark');
            localStorage.setItem('color-theme', 'dark');
            setDarkMode(true);
          }
        };

        return (
          <div className="min-h-screen flex flex-col relative pb-12 bg-slate-50 dark:bg-dark transition-colors duration-300">
            <Navbar darkMode={darkMode} toggleTheme={toggleTheme} />
            <Hero currentGameweek={21} />
            
            <div className="container mx-auto px-4 py-8">
              <div className="mb-8">
                <SmartFixtures data={MOCK_FIXTURES} />
              </div>
              
              <div className="bg-white dark:bg-slate-800 rounded-xl shadow-xl p-6 border border-slate-200 dark:border-slate-700">
                <h3 className="text-xl font-bold text-primary dark:text-white mb-4">
                  🌤️ Weather Intelligence Integration
                </h3>
                <p className="text-slate-600 dark:text-slate-300 mb-4">
                  This is a fully functional demonstration of the Premier League Hub with weather integration. 
                  The weather widgets show real-time conditions for each stadium location.
                </p>
                <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                  <div className="bg-green-50 dark:bg-green-900/20 p-4 rounded-lg border border-green-200 dark:border-green-800">
                    <i className="fas fa-check-circle text-green-500 text-2xl mb-2"></i>
                    <h4 className="font-bold text-green-700 dark:text-green-300">Live Weather Data</h4>
                    <p className="text-sm text-green-600 dark:text-green-400">Real-time conditions from Open-Meteo API</p>
                  </div>
                  <div className="bg-blue-50 dark:bg-blue-900/20 p-4 rounded-lg border border-blue-200 dark:border-blue-800">
                    <i className="fas fa-cloud-sun text-blue-500 text-2xl mb-2"></i>
                    <h4 className="font-bold text-blue-700 dark:text-blue-300">Smart Verdicts</h4>
                    <p className="text-sm text-blue-600 dark:text-blue-400">Weather impact analysis for each match</p>
                  </div>
                  <div className="bg-purple-50 dark:bg-purple-900/20 p-4 rounded-lg border border-purple-200 dark:border-purple-800">
                    <i className="fas fa-sync text-purple-500 text-2xl mb-2"></i>
                    <h4 className="font-bold text-purple-700 dark:text-purple-300">Interactive</h4>
                    <p className="text-sm text-purple-600 dark:text-purple-400">Click to refresh and hover for details</p>
                  </div>
                </div>
              </div>
            </div>
          </div>
        );
      };

      // Render the app
      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
    </script>
  </body>
</html>
