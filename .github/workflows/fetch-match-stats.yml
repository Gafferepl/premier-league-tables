name: Fetch Match Stats

on:
  schedule:
    # 10:30pm BST (9:30pm UTC) every day — after all PL kickoffs are done
    - cron: '30 21 * * *'
  workflow_dispatch: # allows manual trigger from GitHub Actions tab

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

          cache: 'npm'


      - name: Fetch and cache match stats
        run: node scripts/fetch-match-stats.js --force
        env:
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
